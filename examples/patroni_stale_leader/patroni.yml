scope: patroni_stale_leader
namespace: /service/
name: $CLUSTER_NAME

log:
  level: DEBUG
  traceback_level: DEBUG

restapi:
  listen: 0.0.0.0:8008
  connect_address: $NODE_ADDRESS:8008

etcd3:
  hosts: $ETCD3_HOSTS

bootstrap:
  dcs:
    ttl: 20
    loop_wait: 2
    retry_timeout: 3
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10
        wal_keep_size: 128MB

  initdb:
    - encoding: UTF8
    - data-checksums

  pg_hba:
    - host replication replicator 0.0.0.0/0 md5
    - host all all 0.0.0.0/0 md5
    - host all all ::0/0 md5

postgresql:
  listen: 0.0.0.0:5432
  connect_address: $NODE_ADDRESS:5432
  data_dir: /var/lib/postgresql/data
  bin_dir: /usr/lib/postgresql/17/bin

  authentication:
    superuser:
      username: postgres
      password: postgres
    replication:
      username: replicator
      password: replicator

  parameters:
    unix_socket_directories: /var/run/postgresql

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
